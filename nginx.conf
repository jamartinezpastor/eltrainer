server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida vuelve a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cachear assets con hash en el nombre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
